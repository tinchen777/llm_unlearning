# https://hydra.cc/docs/configure_hydra/intro/

# enable rich logging (requires `pip install rich`)
defaults:
  - override hydra_logging: colorlog   # Hydra's own framework logs
  - override job_logging: colorlog     # your application logs (the ones you usually care about)
  # To revert to the old style: change these to `colorlog`, or per-run e.g.
  # `hydra/job_logging=colorlog hydra/hydra_logging=colorlog`.

# output directory, generated dynamically on each run
run:
  # dir: ${paths.save_dir}/${now:%Y-%m-%d}_${now:%H-%M-%S}
  dir: ${paths.output_dir}
# sweep:
#   dir: ${paths.log_dir}/${task_name}/multiruns/${now:%Y-%m-%d}_${now:%H-%M-%S}
#   subdir: ${hydra.job.num}

job_logging:
  handlers:
    file:
      # Incorporates fix from https://github.com/facebookresearch/hydra/pull/2242
      filename: ${hydra.runtime.output_dir}/${trainer.handler}.log